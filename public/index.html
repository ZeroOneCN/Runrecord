<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运动步数记录</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary-color: #07c160;
      --primary-hover: #06ad56;
      --primary-light: rgba(7, 193, 96, 0.08);
      --primary-gradient: linear-gradient(135deg, #07c160 0%, #00d68f 100%);
      --danger-color: #ff4d4f;
      --danger-hover: #ff7875;
      --warning-color: #faad14;
      --text-primary: #1f1f1f;
      --text-secondary: #595959;
      --text-disabled: #bfbfbf;
      --border-color: rgba(0, 0, 0, 0.06);
      --bg-color: #f5f7fa;
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-glass: rgba(255, 255, 255, 0.7);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.08), 0 16px 48px rgba(0, 0, 0, 0.12);
      --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.1), 0 24px 64px rgba(0, 0, 0, 0.15);
      --radius: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; 
      background: var(--bg-color);
      background-image: 
        radial-gradient(ellipse at top left, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
      padding: 32px;
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    h1 { 
      text-align: center; 
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px; 
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(7, 193, 96, 0.2);
    }
    
    .card { 
      background: var(--card-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-lg); 
      padding: 28px; 
      margin-bottom: 24px; 
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover { 
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.8);
    }
    .card h2 { 
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px; 
      font-size: 20px; 
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { 
      display: block; 
      margin-bottom: 8px; 
      color: var(--text-secondary); 
      font-weight: 600;
      font-size: 14px;
    }
    .form-group input, .form-group select { 
      width: 100%; 
      padding: 12px 16px; 
      border: 1px solid var(--border-color); 
      border-radius: var(--radius); 
      font-size: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
    }
    .form-group input:focus, .form-group select:focus { 
      outline: none; 
      border-color: var(--primary-color);
      background: #fff;
      box-shadow: 0 0 0 4px var(--primary-light), 0 4px 12px rgba(7, 193, 96, 0.15);
      transform: translateY(-1px);
    }
    
    .btn { 
      background: var(--primary-gradient);
      color: white; 
      border: none; 
      padding: 12px 28px; 
      border-radius: var(--radius); 
      cursor: pointer; 
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(7, 193, 96, 0.4);
    }
    .btn:active { transform: translateY(0); }
    .btn-danger { 
      background: linear-gradient(135deg, #ff4d4f 0%, #ff7875 100%);
      box-shadow: 0 4px 12px rgba(255, 77, 79, 0.3);
    }
    .btn-danger:hover { 
      box-shadow: 0 8px 20px rgba(255, 77, 79, 0.4);
    }
    .btn-warning { 
      background: linear-gradient(135deg, #faad14 0%, #ffc53d 100%);
      box-shadow: 0 4px 12px rgba(250, 173, 20, 0.3);
    }
    .btn-warning:hover { 
      box-shadow: 0 8px 20px rgba(250, 173, 20, 0.4);
    }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-group { display: flex; gap: 8px; }
    
    .tabs { 
      display: flex; 
      background: rgba(0, 0, 0, 0.03);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 4px 4px 0;
      margin-bottom: 20px;
      gap: 4px;
    }
    .tab { 
      padding: 14px 28px; 
      cursor: pointer; 
      color: var(--text-secondary);
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius) var(--radius) 0 0;
      position: relative;
      overflow: hidden;
    }
    .tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 3px;
      background: var(--primary-gradient);
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }
    .tab:hover { 
      color: var(--primary-color);
      background: var(--primary-light);
    }
    .tab.active { 
      color: var(--primary-color);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
    }
    .tab.active::after {
      width: 80%;
    }
    
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
      gap: 20px; 
    }
    .stat-item { 
      background: var(--card-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 24px; 
      border-radius: var(--radius-lg); 
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .stat-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-gradient);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .stat-item:hover { 
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--shadow-float);
      border-color: rgba(255, 255, 255, 0.9);
    }
    .stat-item:hover::before {
      opacity: 1;
    }
    .stat-item .value { 
      font-size: 36px; 
      font-weight: 800; 
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      text-shadow: 0 4px 12px rgba(7, 193, 96, 0.2);
    }
    .stat-item .label { 
      font-size: 14px; 
      color: var(--text-secondary); 
      margin-top: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-item .count { 
      font-size: 12px; 
      color: var(--text-disabled); 
      margin-top: 6px;
      background: rgba(0, 0, 0, 0.05);
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
    }
    
    .table-container { 
      overflow-x: auto; 
      border-radius: var(--radius);
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 14px;
    }
    th, td { 
      padding: 16px 14px; 
      text-align: left; 
      border-bottom: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }
    th { 
      background: rgba(0, 0, 0, 0.02);
      color: var(--text-secondary); 
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    th:hover { 
      background: rgba(0, 0, 0, 0.04);
      color: var(--primary-color);
    }
    th.sorted { 
      color: var(--primary-color);
      background: var(--primary-light);
    }
    th .sort-icon { 
      margin-left: 6px; 
      opacity: 0.3;
      transition: opacity 0.2s ease;
    }
    th:hover .sort-icon, th.sorted .sort-icon { 
      opacity: 1; 
    }
    tr:hover { 
      background: var(--primary-light);
    }
    tr:last-child td {
      border-bottom: none;
    }
    
    .no-data { 
      text-align: center; 
      color: var(--text-disabled); 
      padding: 80px 20px; 
      font-size: 15px;
      background: rgba(0, 0, 0, 0.02);
      border-radius: var(--radius);
      margin: 20px 0;
    }
    
    .filter-row { 
      display: flex; 
      gap: 16px; 
      flex-wrap: wrap; 
      margin-bottom: 20px; 
    }
    .filter-row .form-group { flex: 1; min-width: 150px; margin-bottom: 0; }
    
    /* 弹窗样式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 40px;
      width: 90%;
      max-width: 520px;
      box-shadow: var(--shadow-float);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transform: scale(0.9) translateY(-30px) rotateX(10deg);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal {
      transform: scale(1) translateY(0) rotateX(0);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .modal-title {
      font-size: 24px;
      font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .modal-close {
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }
    .modal-close:hover {
      background: var(--danger-color);
      color: white;
      transform: rotate(90deg) scale(1.1);
    }
    .modal-body { 
      margin-bottom: 28px;
    }
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }
    .modal-footer .btn { min-width: 100px; }
    
    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }
    .pagination button {
      padding: 10px 18px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      color: var(--text-secondary);
    }
    .pagination button:hover:not(:disabled) {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(7, 193, 96, 0.2);
    }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .pagination .page-info {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      padding: 0 12px;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      body { padding: 16px; }
      .card { padding: 20px; }
      .filter-row { flex-direction: column; }
      .filter-row .form-group { min-width: 100%; }
      .stats-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .stat-item .value { font-size: 28px; }
      h1 { font-size: 28px; }
      .modal { padding: 24px; }
      .btn-group { flex-direction: column; }
    }
    
    /* 时间点快速选择 */
    .time-points {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .time-points .btn-sm {
      min-width: 60px;
    }

    /* Toast 通知 */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 14px 28px;
      border-radius: 50px;
      box-shadow: var(--shadow-float);
      z-index: 2000;
      font-size: 14px;
      font-weight: 600;
      border-left: 4px solid;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      justify-content: center;
    }
    .toast.success { border-color: var(--primary-color); color: var(--primary-color); }
    .toast.error { border-color: var(--danger-color); color: var(--danger-color); }
    .toast.warning { border-color: var(--warning-color); color: var(--warning-color); }
    .toast.info { border-color: #1890ff; color: #1890ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="vertical-align: middle; margin-right: 10px;">
        <defs>
          <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#07c160;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00d68f;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path d="M20.59 13.41l-7.17 7.17a2.001 2.001 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2.001 2.001 0 0 1 0 2.82z" 
              fill="url(#iconGradient)" stroke="url(#iconGradient)" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="6.5" cy="6.5" r="1.5" fill="white" opacity="0.9"/>
      </svg>
      运动步数记录
    </h1>

    <!-- 添加记录 -->
    <div class="card">
      <h2>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        添加步数记录
      </h2>
      <div class="filter-row">
        <div class="form-group">
          <label>用户 ID</label>
          <input type="text" id="userId" placeholder="输入用户 ID">
        </div>
        <div class="form-group">
          <label>步数</label>
          <input type="number" id="steps" placeholder="输入步数">
        </div>
        <div class="form-group">
          <label>记录时间</label>
          <input type="datetime-local" id="recordTime">
        </div>
      </div>
      <div class="time-points">
        <span style="color: var(--text-secondary); font-size: 14px; margin-right: 12px;">快速选择时间点：</span>
        <button class="btn btn-sm" onclick="setTimePoint(9)">9:00</button>
        <button class="btn btn-sm" onclick="setTimePoint(12)">12:00</button>
        <button class="btn btn-sm" onclick="setTimePoint(18)">18:00</button>
        <button class="btn btn-sm" onclick="setTimePoint(24)">24:00</button>
      </div>
      <button class="btn" onclick="addStepRecord()" style="margin-top: 16px;">添加记录</button>
    </div>

    <!-- 数据统计 -->
    <div class="card">
      <h2>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3 3v18h18M7 16l4-4 4 4 5-6" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        数据统计
      </h2>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('daily')">每天</div>
        <div class="tab" onclick="switchTab('monthly')">每月</div>
      </div>

      <div class="filter-row">
        <div class="form-group">
          <label>用户 ID</label>
          <input type="text" id="filterUserId" placeholder="输入用户 ID" onchange="loadStats()">
        </div>
        <div class="form-group" id="strideGroup" style="display: none;">
          <label>步幅 (米)</label>
          <input type="number" id="strideLength" placeholder="默认 0.7" step="0.01" min="0.1" max="2" onchange="saveStride()">
        </div>
        <div class="form-group" id="monthFilter">
          <label>月份</label>
          <input type="month" id="filterMonth" onchange="loadStats()">
        </div>
        <div class="form-group" id="yearFilter" style="display:none;">
          <label>年份</label>
          <input type="number" id="filterYear" placeholder="YYYY" onchange="loadStats()">
        </div>
      </div>

      <div id="chartContainer" style="margin-bottom: 24px; background: rgba(255,255,255,0.6); border-radius: var(--radius-lg); padding: 20px;">
        <canvas id="stepsChart" height="80"></canvas>
      </div>

      <div id="statsContent"></div>
      <div class="pagination" id="statsPagination"></div>
    </div>

    <!-- 所有记录 -->
    <div class="card">
      <h2>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="url(#iconGradient)" stroke-width="2"/>
          <path d="M3 9h18M9 21V9" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        所有记录
      </h2>
      <div class="filter-row" style="margin-bottom: 16px;">
        <div class="form-group">
          <label>用户 ID</label>
          <input type="text" id="recordsFilterUserId" placeholder="输入用户 ID" onchange="currentPage = 1; loadRecords()">
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th onclick="sortTable('id')">ID <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('user_id')">用户 ID <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('steps')">步数 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('record_time')">记录时间 <span class="sort-icon">↕</span></th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordsTable"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">编辑记录</h3>
        <button class="modal-close" onclick="closeEditModal()">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>用户 ID</label>
          <input type="text" id="editUserId" placeholder="输入用户 ID">
        </div>
        <div class="form-group">
          <label>步数</label>
          <input type="number" id="editSteps" placeholder="输入步数">
        </div>
        <div class="form-group">
          <label>记录时间</label>
          <input type="datetime-local" id="editRecordTime">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-warning" onclick="closeEditModal()">取消</button>
        <button class="btn" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'daily';
    let currentPage = 1;
    const pageSize = 10;
    let sortField = 'record_time';
    let sortDirection = 'desc';
    let allRecords = [];
    let stepsChart = null;
    let statsData = [];
    let statsPageSize = 10;
    let statsCurrentPage = 1;
    let totalRecords = 0;

    // 初始化日期为今天
    const now = new Date();
    const today = now.toISOString().slice(0, 10);
    const currentMonth = now.toISOString().slice(0, 7);
    document.getElementById('recordTime').value = now.toISOString().slice(0, 16);
    document.getElementById('filterMonth').value = currentMonth;
    document.getElementById('filterYear').value = now.getFullYear();

    function switchTab(tab) {
      currentTab = tab;
      statsCurrentPage = 1;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      document.getElementById('monthFilter').style.display = (tab === 'daily') ? 'block' : 'none';
      document.getElementById('yearFilter').style.display = (tab === 'monthly') ? 'block' : 'none';

      loadStats();
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '';
      return dateStr.replace('T', ' ').substring(0, 19);
    }

    function parseDateTime(dateStr) {
      if (!dateStr) return '';
      return dateStr.replace(' ', 'T').substring(0, 16);
    }

    function setTimePoint(hour) {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');

      // 24点设为当天的23:59
      if (hour === 24) {
        document.getElementById('recordTime').value = `${year}-${month}-${day}T23:59`;
        return;
      }

      const hourStr = String(hour).padStart(2, '0');
      document.getElementById('recordTime').value = `${year}-${month}-${day}T${hourStr}:00`;
    }

    async function addStepRecord() {
      const user_id = document.getElementById('userId').value;
      const steps = document.getElementById('steps').value;
      const record_time = document.getElementById('recordTime').value;

      if (!user_id || !steps) {
        showToast('请填写用户 ID 和步数', 'error');
        return;
      }

      const res = await fetch('/api/steps', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id, steps, record_time })
      });

      const data = await res.json();
      if (res.ok) {
        showToast('记录添加成功！', 'success');
        document.getElementById('steps').value = '';
        loadRecords();
        loadStats();
      } else {
        showToast('添加失败：' + data.error, 'error');
      }
    }

    async function loadStats() {
      const user_id = document.getElementById('filterUserId').value;
      if (!user_id) {
        document.getElementById('statsContent').innerHTML = '<div class="no-data">请输入用户 ID 查看统计</div>';
        document.getElementById('chartContainer').style.display = 'none';
        document.getElementById('statsPagination').innerHTML = '';
        document.getElementById('strideGroup').style.display = 'none';
        return;
      }

      document.getElementById('chartContainer').style.display = 'block';
      document.getElementById('strideGroup').style.display = 'block';
      statsCurrentPage = 1;

      // 加载用户步幅设置
      loadStrideSettings(user_id);

      let url = '';
      switch (currentTab) {
        case 'daily':
          const month = document.getElementById('filterMonth').value;
          url = `/api/steps/daily?user_id=${user_id}${month ? '&month=' + month : ''}`;
          break;
        case 'monthly':
          const year = document.getElementById('filterYear').value;
          url = `/api/steps/monthly?user_id=${user_id}${year ? '&year=' + year : ''}`;
          break;
      }

      const res = await fetch(url);
      const data = await res.json();

      if (data.length === 0) {
        document.getElementById('statsContent').innerHTML = '<div class="no-data">暂无数据</div>';
        document.getElementById('chartContainer').style.display = 'none';
        document.getElementById('statsPagination').innerHTML = '';
        return;
      }

      statsData = data;
      renderChart(data);
      renderStatsWithPagination(data);
    }

    async function loadStrideSettings(user_id) {
      try {
        const res = await fetch(`/api/settings/${user_id}`);
        const data = await res.json();
        document.getElementById('strideLength').value = data.stride_length || 0.7;
      } catch (err) {
        document.getElementById('strideLength').value = 0.7;
      }
    }

    async function saveStride() {
      const user_id = document.getElementById('filterUserId').value;
      const stride_length = parseFloat(document.getElementById('strideLength').value);

      if (!stride_length || stride_length <= 0) {
        showToast('请输入有效的步幅', 'error');
        return;
      }

      const res = await fetch(`/api/settings/${user_id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stride_length })
      });

      if (res.ok) {
        showToast('步幅已保存', 'success');
        loadStats(); // 重新加载统计数据以更新距离
      } else {
        showToast('保存失败', 'error');
      }
    }

    function renderChart(data) {
      // 曲线图数据按时间从小到大排序
      const sortedData = [...data].sort((a, b) => {
        return (a.date || a.month).localeCompare(b.date || b.month);
      });

      const ctx = document.getElementById('stepsChart').getContext('2d');
      const labels = sortedData.map(item => item.date || item.month);
      const values = sortedData.map(item => item.total_steps || 0);

      if (stepsChart) {
        stepsChart.destroy();
      }

      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, 'rgba(7, 193, 96, 0.3)');
      gradient.addColorStop(1, 'rgba(7, 193, 96, 0.01)');

      stepsChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '步数',
            data: values,
            borderColor: '#07c160',
            backgroundColor: gradient,
            borderWidth: 3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#07c160',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
            pointHoverBackgroundColor: '#07c160',
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 3,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12,
              titleFont: { size: 14 },
              bodyFont: { size: 14 },
              borderColor: 'rgba(255, 255, 255, 0.2)',
              borderWidth: 1,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return '步数：' + context.parsed.y.toLocaleString();
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: 'rgba(0, 0, 0, 0.05)'
              },
              ticks: {
                callback: function(value) {
                  return value.toLocaleString();
                }
              }
            },
            x: {
              grid: {
                display: false
              }
            }
          }
        }
      });
    }

    function renderStatsWithPagination(data) {
      // 卡片按时间从大到小排列（最新时间在前），与曲线图相反
      const sortedData = [...data].sort((a, b) => {
        return (b.date || b.month).localeCompare(a.date || a.month);
      });

      const totalPages = Math.ceil(sortedData.length / statsPageSize);
      const startIndex = (statsCurrentPage - 1) * statsPageSize;
      const endIndex = startIndex + statsPageSize;
      const pageData = sortedData.slice(startIndex, endIndex);

      let html = '<div class="stats-grid">';
      pageData.forEach(item => {
        const label = item.date || item.month;
        const distance = item.distance_km ? parseFloat(item.distance_km).toFixed(1) : '0.0';
        html += `
          <div class="stat-item">
            <div class="value">${(item.total_steps || 0).toLocaleString()}</div>
            <div class="label">${label}</div>
            <div class="count">${item.record_count || 0} 条记录</div>
            <div class="distance" style="margin-top: 8px; font-size: 13px; color: var(--primary-color); font-weight: 600;">
              🏃 ${distance} 公里
            </div>
          </div>
        `;
      });
      html += '</div>';
      document.getElementById('statsContent').innerHTML = html;

      renderStatsPagination(totalPages);
    }

    function renderStatsPagination(totalPages) {
      if (totalPages <= 1) {
        document.getElementById('statsPagination').innerHTML = '';
        return;
      }

      let html = `
        <button onclick="changeStatsPage(${statsCurrentPage - 1})" ${statsCurrentPage === 1 ? 'disabled' : ''}>上一页</button>
        <span class="page-info">第 ${statsCurrentPage} 页 / 共 ${totalPages} 页</span>
        <button onclick="changeStatsPage(${statsCurrentPage + 1})" ${statsCurrentPage >= totalPages ? 'disabled' : ''}>下一页</button>
      `;
      document.getElementById('statsPagination').innerHTML = html;
    }

    function changeStatsPage(page) {
      const totalPages = Math.ceil(statsData.length / statsPageSize);
      if (page < 1 || page > totalPages) return;
      statsCurrentPage = page;
      renderStatsWithPagination(statsData);
    }

    async function loadRecords() {
      const user_id = document.getElementById('recordsFilterUserId').value;
      const url = `/api/steps?user_id=${encodeURIComponent(user_id)}&limit=${pageSize}&offset=${(currentPage - 1) * pageSize}`;
      const res = await fetch(url);
      const result = await res.json();
      allRecords = result.data || [];
      totalRecords = result.total || 0;

      if (allRecords.length === 0) {
        document.getElementById('recordsTable').innerHTML = '<tr><td colspan="5" class="no-data">暂无记录</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      renderTable(allRecords);
      renderPagination();
    }

    function renderTable(records) {
      // 排序
      records.sort((a, b) => {
        let aVal = a[sortField];
        let bVal = b[sortField];
        
        if (sortField === 'steps') {
          aVal = parseInt(aVal) || 0;
          bVal = parseInt(bVal) || 0;
        } else if (sortField === 'record_time') {
          aVal = new Date(aVal).getTime();
          bVal = new Date(bVal).getTime();
        }
        
        if (sortDirection === 'asc') {
          return aVal > bVal ? 1 : -1;
        } else {
          return aVal < bVal ? 1 : -1;
        }
      });

      let html = '';
      records.forEach(record => {
        html += `
          <tr>
            <td>${record.id}</td>
            <td>${record.user_id}</td>
            <td>${parseInt(record.steps)}</td>
            <td>${formatDateTime(record.record_time)}</td>
            <td>
              <div class="btn-group">
                <button class="btn btn-warning btn-sm" onclick="openEditModal(${record.id})">编辑</button>
                <button class="btn btn-danger btn-sm" onclick="deleteRecord(${record.id})">删除</button>
              </div>
            </td>
          </tr>
        `;
      });
      document.getElementById('recordsTable').innerHTML = html;
      
      // 更新表头排序状态
      document.querySelectorAll('th').forEach(th => {
        th.classList.remove('sorted');
        const icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = '↕';
      });
      const currentTh = document.querySelector(`th[onclick="sortTable('${sortField}')"]`);
      if (currentTh) {
        currentTh.classList.add('sorted');
        const icon = currentTh.querySelector('.sort-icon');
        if (icon) icon.textContent = sortDirection === 'asc' ? '↑' : '↓';
      }
    }

    function sortTable(field) {
      if (sortField === field) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDirection = 'desc';
      }
      renderTable(allRecords);
    }

    function renderPagination() {
      const totalPages = Math.ceil(totalRecords / pageSize);
      if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      let html = `
        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
        <span class="page-info">第 ${currentPage} 页 / 共 ${totalPages} 页</span>
        <button onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>
      `;
      document.getElementById('pagination').innerHTML = html;
    }

    function changePage(page) {
      const totalPages = Math.ceil(totalRecords / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadRecords();
    }

    async function deleteRecord(id) {
      if (!confirm('确定要删除这条记录吗？')) return;

      const res = await fetch(`/api/steps/${id}`, { method: 'DELETE' });
      const data = await res.json();

      if (res.ok) {
        showToast('记录已删除', 'success');
        loadRecords();
        loadStats();
      } else {
        showToast('删除失败：' + data.error, 'error');
      }
    }

    // 编辑功能
    function openEditModal(id) {
      const record = allRecords.find(r => r.id === id);
      if (!record) return;

      document.getElementById('editId').value = record.id;
      document.getElementById('editUserId').value = record.user_id;
      document.getElementById('editSteps').value = record.steps;
      document.getElementById('editRecordTime').value = parseDateTime(record.record_time);
      
      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
    }

    async function saveEdit() {
      const id = document.getElementById('editId').value;
      const user_id = document.getElementById('editUserId').value;
      const steps = document.getElementById('editSteps').value;
      const record_time = document.getElementById('editRecordTime').value;

      if (!user_id || !steps) {
        showToast('请填写用户 ID 和步数', 'error');
        return;
      }

      const res = await fetch(`/api/steps/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id, steps, record_time })
      });

      const data = await res.json();
      if (res.ok) {
        showToast('记录已更新', 'success');
        closeEditModal();
        loadRecords();
        loadStats();
      } else {
        showToast('更新失败：' + data.error, 'error');
      }
    }

    // Toast 提示
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.transform = 'translateX(-50%) translateY(0)';
      }, 10);

      setTimeout(() => {
        toast.style.transform = 'translateX(-50%) translateY(-150px)';
        setTimeout(() => toast.remove(), 400);
      }, 2500);
    }

    // 点击遮罩关闭弹窗
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeEditModal();
    });

    // 初始化加载
    loadRecords();
    loadStats();
  </script>
</body>
</html>
