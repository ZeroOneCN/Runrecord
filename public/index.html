<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运动步数记录</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary-color: #07c160;
      --primary-hover: #06ad56;
      --primary-light: rgba(7, 193, 96, 0.08);
      --primary-gradient: linear-gradient(135deg, #07c160 0%, #00d68f 100%);
      --danger-color: #ff4d4f;
      --danger-hover: #ff7875;
      --warning-color: #faad14;
      --text-primary: #1f1f1f;
      --text-secondary: #595959;
      --text-disabled: #bfbfbf;
      --border-color: rgba(0, 0, 0, 0.06);
      --bg-color: #f5f7fa;
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-glass: rgba(255, 255, 255, 0.7);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.08), 0 16px 48px rgba(0, 0, 0, 0.12);
      --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.1), 0 24px 64px rgba(0, 0, 0, 0.15);
      --radius: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; 
      background: var(--bg-color);
      background-image: 
        radial-gradient(ellipse at top left, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
      padding: 32px;
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    h1 { 
      text-align: center; 
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px; 
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(7, 193, 96, 0.2);
    }
    
    .card { 
      background: var(--card-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-lg); 
      padding: 28px; 
      margin-bottom: 24px; 
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover { 
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.8);
    }
    .card h2 { 
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px; 
      font-size: 20px; 
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { 
      display: block; 
      margin-bottom: 8px; 
      color: var(--text-secondary); 
      font-weight: 600;
      font-size: 14px;
    }
    .form-group input, .form-group select { 
      width: 100%; 
      padding: 12px 16px; 
      border: 1px solid var(--border-color); 
      border-radius: var(--radius); 
      font-size: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
    }
    .form-group input:focus, .form-group select:focus { 
      outline: none; 
      border-color: var(--primary-color);
      background: #fff;
      box-shadow: 0 0 0 4px var(--primary-light), 0 4px 12px rgba(7, 193, 96, 0.15);
      transform: translateY(-1px);
    }
    
    .btn { 
      background: var(--primary-gradient);
      color: white; 
      border: none; 
      padding: 12px 28px; 
      border-radius: var(--radius); 
      cursor: pointer; 
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(7, 193, 96, 0.4);
    }
    .btn:active { transform: translateY(0); }
    .btn-danger { 
      background: linear-gradient(135deg, #ff4d4f 0%, #ff7875 100%);
      box-shadow: 0 4px 12px rgba(255, 77, 79, 0.3);
    }
    .btn-danger:hover { 
      box-shadow: 0 8px 20px rgba(255, 77, 79, 0.4);
    }
    .btn-warning { 
      background: linear-gradient(135deg, #faad14 0%, #ffc53d 100%);
      box-shadow: 0 4px 12px rgba(250, 173, 20, 0.3);
    }
    .btn-warning:hover { 
      box-shadow: 0 8px 20px rgba(250, 173, 20, 0.4);
    }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-group { display: flex; gap: 8px; }
    
    .tabs { 
      display: flex; 
      background: rgba(0, 0, 0, 0.03);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 4px 4px 0;
      margin-bottom: 20px;
      gap: 4px;
    }
    .tab { 
      padding: 14px 28px; 
      cursor: pointer; 
      color: var(--text-secondary);
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius) var(--radius) 0 0;
      position: relative;
      overflow: hidden;
    }
    .tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 3px;
      background: var(--primary-gradient);
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }
    .tab:hover { 
      color: var(--primary-color);
      background: var(--primary-light);
    }
    .tab.active { 
      color: var(--primary-color);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
    }
    .tab.active::after {
      width: 80%;
    }
    
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
      gap: 20px; 
    }
    .stat-item { 
      background: var(--card-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 24px; 
      border-radius: var(--radius-lg); 
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .stat-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-gradient);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .stat-item:hover { 
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--shadow-float);
      border-color: rgba(255, 255, 255, 0.9);
    }
    .stat-item:hover::before {
      opacity: 1;
    }
    .stat-item .value { 
      font-size: 36px; 
      font-weight: 800; 
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      text-shadow: 0 4px 12px rgba(7, 193, 96, 0.2);
    }
    .stat-item .label { 
      font-size: 14px; 
      color: var(--text-secondary); 
      margin-top: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-item .count { 
      font-size: 12px; 
      color: var(--text-disabled); 
      margin-top: 6px;
      background: rgba(0, 0, 0, 0.05);
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
    }
    
    .table-container { 
      overflow-x: auto; 
      border-radius: var(--radius);
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 14px;
    }
    th, td { 
      padding: 16px 14px; 
      text-align: left; 
      border-bottom: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }
    th { 
      background: rgba(0, 0, 0, 0.02);
      color: var(--text-secondary); 
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    th:hover { 
      background: rgba(0, 0, 0, 0.04);
      color: var(--primary-color);
    }
    th.sorted { 
      color: var(--primary-color);
      background: var(--primary-light);
    }
    th .sort-icon { 
      margin-left: 6px; 
      opacity: 0.3;
      transition: opacity 0.2s ease;
    }
    th:hover .sort-icon, th.sorted .sort-icon { 
      opacity: 1; 
    }
    tr:hover { 
      background: var(--primary-light);
    }
    tr:last-child td {
      border-bottom: none;
    }
    
    .no-data { 
      text-align: center; 
      color: var(--text-disabled); 
      padding: 80px 20px; 
      font-size: 15px;
      background: rgba(0, 0, 0, 0.02);
      border-radius: var(--radius);
      margin: 20px 0;
    }
    
    .filter-row { 
      display: flex; 
      gap: 16px; 
      flex-wrap: wrap; 
      margin-bottom: 20px; 
    }
    .filter-row .form-group { flex: 1; min-width: 150px; margin-bottom: 0; }
    
    /* 弹窗样式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 40px;
      width: 90%;
      max-width: 520px;
      box-shadow: var(--shadow-float);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transform: scale(0.9) translateY(-30px) rotateX(10deg);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal {
      transform: scale(1) translateY(0) rotateX(0);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .modal-title {
      font-size: 24px;
      font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .modal-close {
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }
    .modal-close:hover {
      background: var(--danger-color);
      color: white;
      transform: rotate(90deg) scale(1.1);
    }
    .modal-body { 
      margin-bottom: 28px;
    }
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }
    .modal-footer .btn { min-width: 100px; }
    
    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }
    .pagination button {
      padding: 10px 18px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      color: var(--text-secondary);
    }
    .pagination button:hover:not(:disabled) {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(7, 193, 96, 0.2);
    }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .pagination .page-info {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      padding: 0 12px;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      body { padding: 16px; }
      .card { padding: 20px; }
      .filter-row { flex-direction: column; }
      .filter-row .form-group { min-width: 100%; }
      .stats-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .stat-item .value { font-size: 28px; }
      h1 { font-size: 28px; }
      .modal { padding: 24px; }
      .btn-group { flex-direction: column; }
      
      /* 移动端表格优化 */
      .table-container { overflow-x: auto; }
      table { min-width: 800px; }
      
      /* 移动端小时按钮优化 */
      .hour-btn {
        width: 32px;
        height: 32px;
        font-size: 12px;
      }
      
      /* 移动端批量操作优化 */
      .batch-actions { flex-direction: column; gap: 8px; }
      
      /* 移动端月趋势对比优化 */
      #monthCompare > div { grid-template-columns: 1fr !important; }
      
      /* 移动端确认弹窗 */
      .confirm-modal { padding: 24px; }
      .confirm-modal-title { font-size: 16px; }
      .confirm-modal-message { font-size: 13px; }
    }

    /* 确认弹窗 */
    .confirm-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .confirm-modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .confirm-modal {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 90%;
      max-width: 420px;
      box-shadow: var(--shadow-float);
      transform: scale(0.9) translateY(-20px);
      transition: all 0.3s ease;
    }
    .confirm-modal-overlay.show .confirm-modal {
      transform: scale(1) translateY(0);
    }
    .confirm-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .confirm-modal-message {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 24px;
      background: rgba(0, 0, 0, 0.03);
      padding: 16px;
      border-radius: var(--radius);
      white-space: pre-line;
    }
    .confirm-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .confirm-modal-actions .btn { min-width: 100px; }

    /* Toast 通知 */
    .time-points {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .time-points .btn-sm {
      min-width: 60px;
    }

    /* 时间段按钮 */
    .hour-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .hour-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hour-btn:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--primary-light);
      transform: translateY(-2px);
    }
    .hour-btn.active {
      background: var(--primary-gradient);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
    }

    @media (max-width: 768px) {
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 14px 28px;
      border-radius: 50px;
      box-shadow: var(--shadow-float);
      z-index: 2000;
      font-size: 14px;
      font-weight: 600;
      border-left: 4px solid;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      justify-content: center;
    }
    .toast.success { border-color: var(--primary-color); color: var(--primary-color); }
    .toast.error { border-color: var(--danger-color); color: var(--danger-color); }
    .toast.warning { border-color: var(--warning-color); color: var(--warning-color); }
    .toast.info { border-color: #1890ff; color: #1890ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="vertical-align: middle; margin-right: 10px;">
        <defs>
          <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#07c160;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00d68f;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path d="M20.59 13.41l-7.17 7.17a2.001 2.001 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2.001 2.001 0 0 1 0 2.82z" 
              fill="url(#iconGradient)" stroke="url(#iconGradient)" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="6.5" cy="6.5" r="1.5" fill="white" opacity="0.9"/>
      </svg>
      运动步数记录
    </h1>

    <!-- 添加记录 -->
    <div class="card">
      <h2>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        添加步数记录
      </h2>
      <div class="filter-row">
        <div class="form-group">
          <label>用户 ID</label>
          <input type="text" id="userId" placeholder="输入用户 ID">
        </div>
        <div class="form-group">
          <label>步数</label>
          <input type="number" id="steps" placeholder="输入步数">
        </div>
        <div class="form-group">
          <label>时间段</label>
          <div class="hour-buttons">
            <button class="hour-btn" data-hour="7" onclick="selectHour(7)">7</button>
            <button class="hour-btn" data-hour="8" onclick="selectHour(8)">8</button>
            <button class="hour-btn" data-hour="9" onclick="selectHour(9)">9</button>
            <button class="hour-btn" data-hour="10" onclick="selectHour(10)">10</button>
            <button class="hour-btn" data-hour="11" onclick="selectHour(11)">11</button>
            <button class="hour-btn" data-hour="12" onclick="selectHour(12)">12</button>
            <button class="hour-btn" data-hour="13" onclick="selectHour(13)">13</button>
            <button class="hour-btn" data-hour="14" onclick="selectHour(14)">14</button>
            <button class="hour-btn" data-hour="15" onclick="selectHour(15)">15</button>
            <button class="hour-btn" data-hour="16" onclick="selectHour(16)">16</button>
            <button class="hour-btn" data-hour="17" onclick="selectHour(17)">17</button>
            <button class="hour-btn" data-hour="18" onclick="selectHour(18)">18</button>
            <button class="hour-btn" data-hour="19" onclick="selectHour(19)">19</button>
            <button class="hour-btn" data-hour="20" onclick="selectHour(20)">20</button>
            <button class="hour-btn" data-hour="21" onclick="selectHour(21)">21</button>
            <button class="hour-btn" data-hour="22" onclick="selectHour(22)">22</button>
            <button class="hour-btn" data-hour="23" onclick="selectHour(23)">23</button>
            <button class="hour-btn active" data-hour="" onclick="selectHour('')">全</button>
          </div>
          <input type="hidden" id="hourSelect" value="">
        </div>
      </div>
      <div class="filter-row">
        <div class="form-group">
          <label>记录时间</label>
          <input type="datetime-local" id="recordTime">
        </div>
      </div>
      <div class="time-points">

  <script>
    let currentTab = 'daily';
    let currentPage = 1;
    const pageSize = 10;
    let sortField = 'id';
    let sortDirection = 'desc';
    let allRecords = [];
    let stepsChart = null;
    let statsData = [];
    let statsPageSize = 10;
    let statsCurrentPage = 1;
    let totalRecords = 0;
    let chartHourFilter = null;

    // 初始化日期为今天
    const now = new Date();
    const today = now.toISOString().slice(0, 10);
    const currentMonth = now.toISOString().slice(0, 7);
    // 默认时间为当天 23:59
    document.getElementById('recordTime').value = `${today}T23:59`;
    document.getElementById('filterMonth').value = currentMonth;
    document.getElementById('filterYear').value = now.getFullYear();

    function switchTab(tab) {
      currentTab = tab;
      statsCurrentPage = 1;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      document.getElementById('monthFilter').style.display = (tab === 'daily') ? 'block' : 'none';
      document.getElementById('yearFilter').style.display = (tab === 'monthly') ? 'block' : 'none';
      
      // 月视图时显示趋势对比
      document.getElementById('monthCompare').style.display = (tab === 'monthly') ? 'block' : 'none';

      loadStats();
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '';
      return dateStr.replace('T', ' ').substring(0, 19);
    }

    function parseDateTime(dateStr) {
      if (!dateStr) return '';
      return dateStr.replace(' ', 'T').substring(0, 16);
    }

    function selectHour(hour) {
      document.getElementById('hourSelect').value = hour;
      document.querySelectorAll('.hour-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.hour == hour) {
          btn.classList.add('active');
        }
      });
    }

    function selectChartHour(hour) {
      chartHourFilter = hour === '' ? null : parseInt(hour);
      document.querySelectorAll('#chartContainer .hour-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.hour == hour) {
          btn.classList.add('active');
        }
      });
      loadStats();
    }

    function setTimePoint(hour, minute = 0, isYesterday = false) {
      let now = new Date();
      
      // 如果是昨天，日期减 1 天
      if (isYesterday) {
        now.setDate(now.getDate() - 1);
      }
      
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hourStr = String(hour).padStart(2, '0');
      const minuteStr = String(minute).padStart(2, '0');

      // 昨天 23:59 - 不设置小时字段，表示前一天的最终累计步数
      if (isYesterday) {
        document.getElementById('recordTime').value = `${year}-${month}-${day}T23:59`;
        document.getElementById('hourSelect').value = ''; // 留空，不设置小时
        // 清除所有按钮的 active 状态
        document.querySelectorAll('.hour-btn').forEach(btn => btn.classList.remove('active'));
        // 激活"全"按钮
        document.querySelector('.hour-btn[data-hour=""]').classList.add('active');
        return;
      }

      // 23 点设为 23:59
      if (hour === 23) {
        document.getElementById('recordTime').value = `${year}-${month}-${day}T23:59`;
        document.getElementById('hourSelect').value = '23';
        return;
      }

      document.getElementById('recordTime').value = `${year}-${month}-${day}T${hourStr}:${minuteStr}`;
      document.getElementById('hourSelect').value = hour.toString();
    }

    async function addStepRecord() {
      const user_id = document.getElementById('userId').value;
      const steps = document.getElementById('steps').value;
      const record_time = document.getElementById('recordTime').value;
      const hour = document.getElementById('hourSelect').value;

      if (!user_id || !steps) {
        showToast('请填写用户 ID 和步数', 'error');
        return;
      }

      const res = await fetch('/api/steps', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id, steps, record_time, hour: hour ? parseInt(hour) : null })
      });

      const data = await res.json();
      if (res.ok) {
        showToast('记录添加成功！', 'success');
        document.getElementById('steps').value = '';
        document.getElementById('hourSelect').value = '';
        document.querySelectorAll('.hour-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector('.hour-btn[data-hour=""]').classList.add('active');
        currentPage = 1;
        loadRecords();
        loadStats();
      } else if (res.status === 409) {
        // 重复记录
        const date = data.date || record_time?.split('T')[0];
        const hourText = data.hour ? `${String(data.hour).padStart(2, '0')}:00` : '该天';
        const message = `⚠️ 发现重复记录！\n\n${date} ${hourText} 已有数据：${data.existing_id}号记录\n\n点击"确定"覆盖原有记录，点击"取消"保留原记录。`;
        
        showConfirmModal(message, (confirmed) => {
          if (confirmed) {
            updateExistingRecord(data.existing_id, user_id, steps, record_time, hour);
          }
        });
      } else {
        showToast('添加失败：' + data.error, 'error');
      }
    }

    async function updateExistingRecord(id, user_id, steps, record_time, hour) {
      const res = await fetch(`/api/steps/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id, steps, record_time, hour: hour ? parseInt(hour) : null })
      });

      const data = await res.json();
      if (res.ok) {
        showToast('记录已更新', 'success');
        document.getElementById('steps').value = '';
        currentPage = 1;
        loadRecords();
        loadStats();
      } else {
        showToast('更新失败：' + data.error, 'error');
      }
    }

    async function loadStats() {
      const user_id = document.getElementById('filterUserId').value;
      if (!user_id) {
        document.getElementById('statsContent').innerHTML = '<div class="no-data">请输入用户 ID 查看统计</div>';
        document.getElementById('statsPagination').innerHTML = '';
        document.getElementById('strideGroup').style.display = 'none';
        if (stepsChart) {
          stepsChart.destroy();
          stepsChart = null;
        }
        document.getElementById('stepsChart').style.display = 'none';
        return;
      }

      document.getElementById('strideGroup').style.display = 'block';
      statsCurrentPage = 1;

      // 加载用户步幅设置
      loadStrideSettings(user_id);

      let url = '';
      switch (currentTab) {
        case 'daily':
          const month = document.getElementById('filterMonth').value;
          url = `/api/steps/daily?user_id=${user_id}${month ? '&month=' + month : ''}${chartHourFilter !== null ? '&hour=' + chartHourFilter : ''}`;
          break;
        case 'monthly':
          const year = document.getElementById('filterYear').value;
          url = `/api/steps/monthly?user_id=${user_id}${year ? '&year=' + year : ''}${chartHourFilter !== null ? '&hour=' + chartHourFilter : ''}`;
          break;
      }

      const res = await fetch(url);
      const data = await res.json();

      console.log('统计数据:', data);
      console.log('请求 URL:', url);

      if (data.length === 0) {
        document.getElementById('statsContent').innerHTML = '<div class="no-data">暂无数据</div>';
        document.getElementById('statsPagination').innerHTML = '';
        // 清空图表
        if (stepsChart) {
          stepsChart.destroy();
          stepsChart = null;
        }
        // 显示空状态图表容器
        document.getElementById('stepsChart').style.display = 'none';
        return;
      }

      statsData = data;
      document.getElementById('stepsChart').style.display = 'block';
      renderChart(data);
      renderStatsWithPagination(data);

      // 加载月趋势对比（仅在月视图）
      if (currentTab === 'monthly') {
        const year = document.getElementById('filterYear').value;
        loadMonthCompare(user_id, year);
      }
    }

    async function loadMonthCompare(user_id, year) {
      // 使用当前实际月份，而不是传入的年份
      const now = new Date();
      const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      
      try {
        const res = await fetch(`/api/steps/month-compare?user_id=${user_id}&month=${currentMonth}`);
        const data = await res.json();
        console.log('月趋势对比数据:', data);

        if (!data.current || !data.previous) {
          document.getElementById('currentMonthSteps').textContent = '-';
          document.getElementById('prevMonthSteps').textContent = '-';
          document.getElementById('monthChange').textContent = '-';
          return;
        }

        document.getElementById('currentMonthSteps').textContent = (data.current.steps || 0).toLocaleString();
        document.getElementById('currentMonthLabel').textContent = `${data.current.month} · ${data.current.distance_km || '0.00'}公里`;

        document.getElementById('prevMonthSteps').textContent = (data.previous.steps || 0).toLocaleString();
        document.getElementById('prevMonthLabel').textContent = `${data.previous.month} · ${data.previous.distance_km || '0.00'}公里`;

        const changeEl = document.getElementById('monthChange');
        const changeLabelEl = document.getElementById('monthChangeLabel');

        // 如果上月数据为 0，显示 "-" 或特殊处理
        if (data.previous.steps === 0) {
          changeEl.textContent = '-';
          changeLabelEl.textContent = '上月无数据';
        } else if (data.change > 0) {
          changeEl.textContent = `+${data.change}%`;
          changeLabelEl.textContent = '↑ 增长 vs 上月';
        } else if (data.change < 0) {
          changeEl.textContent = `${data.change}%`;
          changeLabelEl.textContent = '↓ 下降 vs 上月';
        } else {
          changeEl.textContent = '0%';
          changeLabelEl.textContent = '= 持平 vs 上月';
        }
      } catch (err) {
        console.error('加载月趋势对比失败:', err);
        document.getElementById('currentMonthSteps').textContent = '-';
        document.getElementById('prevMonthSteps').textContent = '-';
        document.getElementById('monthChange').textContent = '-';
      }
    }

    async function loadStrideSettings(user_id) {
      try {
        const res = await fetch(`/api/settings/${user_id}`);
        const data = await res.json();
        document.getElementById('strideLength').value = data.stride_length || 0.7;
      } catch (err) {
        document.getElementById('strideLength').value = 0.7;
      }
    }

    async function saveStride() {
      const user_id = document.getElementById('filterUserId').value;
      const stride_length = parseFloat(document.getElementById('strideLength').value);

      if (!stride_length || stride_length <= 0) {
        showToast('请输入有效的步幅', 'error');
        return;
      }

      const res = await fetch(`/api/settings/${user_id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stride_length })
      });

      if (res.ok) {
        showToast('步幅已保存', 'success');
        loadStats(); // 重新加载统计数据以更新距离
      } else {
        showToast('保存失败', 'error');
      }
    }

    function renderChart(data) {
      // 曲线图数据按时间从小到大排序
      const sortedData = [...data].sort((a, b) => {
        return (a.date || a.month).localeCompare(b.date || b.month);
      });

      const ctx = document.getElementById('stepsChart').getContext('2d');
      const labels = sortedData.map(item => item.date || item.month);
      const values = sortedData.map(item => item.total_steps || 0);

      if (stepsChart) {
        stepsChart.destroy();
      }

      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, 'rgba(7, 193, 96, 0.3)');
      gradient.addColorStop(1, 'rgba(7, 193, 96, 0.01)');

      stepsChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '步数',
            data: values,
            borderColor: '#07c160',
            backgroundColor: gradient,
            borderWidth: 3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#07c160',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
            pointHoverBackgroundColor: '#07c160',
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 3,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12,
              titleFont: { size: 14 },
              bodyFont: { size: 14 },
              borderColor: 'rgba(255, 255, 255, 0.2)',
              borderWidth: 1,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return '步数：' + context.parsed.y.toLocaleString();
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: 'rgba(0, 0, 0, 0.05)'
              },
              ticks: {
                callback: function(value) {
                  return value.toLocaleString();
                }
              }
            },
            x: {
              grid: {
                display: false
              }
            }
          }
        }
      });
    }

    function renderStatsWithPagination(data) {
      // 卡片按时间从大到小排列（最新时间在前），与曲线图相反
      const sortedData = [...data].sort((a, b) => {
        return (b.date || b.month).localeCompare(a.date || a.month);
      });

      const totalPages = Math.ceil(sortedData.length / statsPageSize);
      const startIndex = (statsCurrentPage - 1) * statsPageSize;
      const endIndex = startIndex + statsPageSize;
      const pageData = sortedData.slice(startIndex, endIndex);

      let html = '<div class="stats-grid">';
      pageData.forEach(item => {
        const label = item.date || item.month;
        const distance = item.distance_km ? parseFloat(item.distance_km).toFixed(1) : '0.0';
        html += `
          <div class="stat-item">
            <div class="value">${(item.total_steps || 0).toLocaleString()}</div>
            <div class="label">${label}</div>
            <div class="count">${item.record_count || 0} 条记录</div>
            <div class="distance" style="margin-top: 8px; font-size: 13px; color: var(--primary-color); font-weight: 600;">
              🏃 ${distance} 公里
            </div>
          </div>
        `;
      });
      html += '</div>';
      document.getElementById('statsContent').innerHTML = html;

      renderStatsPagination(totalPages);
    }

    function renderStatsPagination(totalPages) {
      if (totalPages <= 1) {
        document.getElementById('statsPagination').innerHTML = '';
        return;
      }

      let html = `
        <button onclick="changeStatsPage(${statsCurrentPage - 1})" ${statsCurrentPage === 1 ? 'disabled' : ''}>上一页</button>
        <span class="page-info">第 ${statsCurrentPage} 页 / 共 ${totalPages} 页</span>
        <button onclick="changeStatsPage(${statsCurrentPage + 1})" ${statsCurrentPage >= totalPages ? 'disabled' : ''}>下一页</button>
      `;
      document.getElementById('statsPagination').innerHTML = html;
    }

    function changeStatsPage(page) {
      const totalPages = Math.ceil(statsData.length / statsPageSize);
      if (page < 1 || page > totalPages) return;
      statsCurrentPage = page;
      renderStatsWithPagination(statsData);
    }

    async function loadRecords() {
      const user_id = document.getElementById('recordsFilterUserId').value;
      const url = `/api/steps?user_id=${encodeURIComponent(user_id)}&limit=${pageSize}&offset=${(currentPage - 1) * pageSize}`;
      const res = await fetch(url);
      const result = await res.json();
      allRecords = result.data || [];
      totalRecords = result.total || 0;

      if (allRecords.length === 0) {
        document.getElementById('recordsTable').innerHTML = '<tr><td colspan="5" class="no-data">暂无记录</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      renderTable(allRecords);
      renderPagination();
    }

    function renderTable(records) {
      // 排序
      records.sort((a, b) => {
        let aVal = a[sortField];
        let bVal = b[sortField];

        if (sortField === 'steps') {
          aVal = parseInt(aVal) || 0;
          bVal = parseInt(bVal) || 0;
        } else if (sortField === 'hour') {
          aVal = aVal === null ? 999 : parseInt(aVal);
          bVal = bVal === null ? 999 : parseInt(bVal);
        } else if (sortField === 'record_time') {
          aVal = new Date(aVal).getTime();
          bVal = new Date(bVal).getTime();
        }

        if (sortDirection === 'asc') {
          return aVal > bVal ? 1 : -1;
        } else {
          return aVal < bVal ? 1 : -1;
        }
      });

      let html = '';
      records.forEach(record => {
        const hourDisplay = record.hour ? `${String(record.hour).padStart(2, '0')}:00` : '-';
        html += `
          <tr>
            <td><input type="checkbox" class="record-checkbox" value="${record.id}" onchange="updateBatchDeleteBtn()"></td>
            <td>${record.id}</td>
            <td>${record.user_id}</td>
            <td>${parseInt(record.steps)}</td>
            <td>${hourDisplay}</td>
            <td>${formatDateTime(record.record_time)}</td>
            <td>
              <div class="btn-group">
                <button class="btn btn-warning btn-sm" onclick="openEditModal(${record.id})">编辑</button>
                <button class="btn btn-danger btn-sm" onclick="deleteRecord(${record.id})">删除</button>
              </div>
            </td>
          </tr>
        `;
      });
      document.getElementById('recordsTable').innerHTML = html;
      
      // 更新表头排序状态
      document.querySelectorAll('th').forEach(th => {
        th.classList.remove('sorted');
        const icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = '↕';
      });
      const currentTh = document.querySelector(`th[onclick="sortTable('${sortField}')"]`);
      if (currentTh) {
        currentTh.classList.add('sorted');
        const icon = currentTh.querySelector('.sort-icon');
        if (icon) icon.textContent = sortDirection === 'asc' ? '↑' : '↓';
      }
    }

    function sortTable(field) {
      if (sortField === field) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDirection = 'desc';
      }
      renderTable(allRecords);
    }

    function renderPagination() {
      const totalPages = Math.ceil(totalRecords / pageSize);
      if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      let html = `
        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
        <span class="page-info">第 ${currentPage} 页 / 共 ${totalPages} 页</span>
        <button onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>
      `;
      document.getElementById('pagination').innerHTML = html;
    }

    function changePage(page) {
      const totalPages = Math.ceil(totalRecords / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      // 翻页时取消选中
      document.querySelectorAll('.record-checkbox').forEach(cb => cb.checked = false);
      updateBatchDeleteBtn();
      loadRecords();
    }

    // 批量删除功能
    function toggleSelectAll() {
      const headerCheckbox = document.getElementById('selectAllHeader');
      const footerCheckbox = document.getElementById('selectAll');
      const checkboxes = document.querySelectorAll('.record-checkbox');
      
      // 同步两个全选按钮状态
      if (headerCheckbox.checked) {
        footerCheckbox.checked = true;
        checkboxes.forEach(cb => cb.checked = true);
      } else {
        footerCheckbox.checked = false;
        checkboxes.forEach(cb => cb.checked = false);
      }
      updateBatchDeleteBtn();
    }

    function updateBatchDeleteBtn() {
      const checkboxes = document.querySelectorAll('.record-checkbox:checked');
      const batchDeleteBtn = document.getElementById('batchDeleteBtn');
      const selectedCount = document.getElementById('selectedCount');
      
      batchDeleteBtn.disabled = checkboxes.length === 0;
      selectedCount.textContent = checkboxes.length > 0 ? `已选 ${checkboxes.length} 条` : '';
      
      // 同步全选按钮状态
      const headerCheckbox = document.getElementById('selectAllHeader');
      const footerCheckbox = document.getElementById('selectAll');
      const allCheckboxes = document.querySelectorAll('.record-checkbox');
      const allChecked = allCheckboxes.length > 0 && allCheckboxes.length === checkboxes.length;
      
      headerCheckbox.checked = allChecked;
      footerCheckbox.checked = allChecked;
    }

    async function batchDelete() {
      const checkboxes = document.querySelectorAll('.record-checkbox:checked');
      const ids = Array.from(checkboxes).map(cb => cb.value);
      
      if (ids.length === 0) {
        showToast('请选择要删除的记录', 'warning');
        return;
      }

      if (!confirm(`确定要删除选中的 ${ids.length} 条记录吗？`)) return;

      const res = await fetch('/api/steps/batch-delete', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids: ids.map(id => parseInt(id)) })
      });

      const data = await res.json();
      if (res.ok) {
        showToast(`成功删除 ${ids.length} 条记录`, 'success');
        currentPage = 1;
        loadRecords();
        loadStats();
      } else {
        showToast('删除失败：' + data.error, 'error');
      }
    }

    async function deleteRecord(id) {
      if (!confirm('确定要删除这条记录吗？')) return;

      const res = await fetch(`/api/steps/${id}`, { method: 'DELETE' });
      const data = await res.json();

      if (res.ok) {
        showToast('记录已删除', 'success');
        loadRecords();
        loadStats();
      } else {
        showToast('删除失败：' + data.error, 'error');
      }
    }

    // 编辑功能
    function openEditModal(id) {
      const record = allRecords.find(r => r.id === id);
      if (!record) return;

      document.getElementById('editId').value = record.id;
      document.getElementById('editUserId').value = record.user_id;
      document.getElementById('editSteps').value = record.steps;
      document.getElementById('editHourSelect').value = record.hour || '';
      document.getElementById('editRecordTime').value = parseDateTime(record.record_time);

      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
    }

    // 确认弹窗
    let confirmCallback = null;

    function showConfirmModal(message, callback) {
      document.getElementById('confirmMessage').textContent = message;
      confirmCallback = callback;
      document.getElementById('confirmModal').classList.add('show');
    }

    function closeConfirmModal(confirmed) {
      document.getElementById('confirmModal').classList.remove('show');
      if (confirmCallback) {
        confirmCallback(confirmed);
        confirmCallback = null;
      }
    }

    // 点击遮罩关闭弹窗
    document.getElementById('confirmModal').addEventListener('click', function(e) {
      if (e.target === this) closeConfirmModal(false);
    });

    async function saveEdit() {
      const id = document.getElementById('editId').value;
      const user_id = document.getElementById('editUserId').value;
      const steps = document.getElementById('editSteps').value;
      const record_time = document.getElementById('editRecordTime').value;
      const hour = document.getElementById('editHourSelect').value;

      if (!user_id || !steps) {
        showToast('请填写用户 ID 和步数', 'error');
        return;
      }

      const res = await fetch(`/api/steps/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id, steps, record_time, hour: hour ? parseInt(hour) : null })
      });

      const data = await res.json();
      if (res.ok) {
        showToast('记录已更新', 'success');
        closeEditModal();
        loadRecords();
        loadStats();
      } else {
        showToast('更新失败：' + data.error, 'error');
      }
    }

    // Toast 提示
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.transform = 'translateX(-50%) translateY(0)';
      }, 10);

      setTimeout(() => {
        toast.style.transform = 'translateX(-50%) translateY(-150px)';
        setTimeout(() => toast.remove(), 400);
      }, 2500);
    }

    // 点击遮罩关闭弹窗
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeEditModal();
    });

    // 初始化加载
    loadRecords();
    loadStats();
  </script>
  <!-- 确认弹窗 -->
  <div class="confirm-modal-overlay" id="confirmModal">
    <div class="confirm-modal">
      <div class="confirm-modal-title">
        <span>⚠️</span>
        <span>重复记录提示</span>
      </div>
      <div class="confirm-modal-message" id="confirmMessage"></div>
      <div class="confirm-modal-actions">
        <button class="btn btn-warning" onclick="closeConfirmModal(false)">取消</button>
        <button class="btn" onclick="closeConfirmModal(true)">确定</button>
      </div>
    </div>
  </div>

</body>
</html>
